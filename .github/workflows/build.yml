name: Build and Release STM32 Veri Kaydedici
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4
      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Bagimliliklari kur
        run: pip install pyserial pyinstaller matplotlib
      - name: .app olustur
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name "STM32_Veri_Kaydedici" \
            --collect-all serial \
            --collect-all matplotlib \
            --hidden-import serial \
            --hidden-import serial.tools \
            --hidden-import serial.tools.list_ports \
            --hidden-import serial.tools.list_ports_osx \
            --hidden-import serial.serialutil \
            --hidden-import matplotlib \
            --hidden-import matplotlib.backends.backend_tkagg \
            --osx-bundle-identifier "com.stm32.verikaydedici" \
            main.py
      - name: .dmg paket olustur
        run: |
          mkdir -p dmg_content
          cp -r dist/STM32_Veri_Kaydedici.app dmg_content/
          hdiutil create \
            -volname "STM32 Veri Kaydedici" \
            -srcfolder dmg_content \
            -ov \
            -format UDZO \
            STM32_Veri_Kaydedici_macOS.dmg
      - name: macOS artifact yukle
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifact
          path: STM32_Veri_Kaydedici_macOS.dmg
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4
      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Bagimliliklari kur
        run: pip install pyserial pyinstaller matplotlib
      - name: .exe olustur
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "STM32_Veri_Kaydedici" `
            --collect-all serial `
            --collect-all matplotlib `
            --hidden-import serial `
            --hidden-import serial.tools `
            --hidden-import serial.tools.list_ports `
            --hidden-import serial.tools.list_ports_windows `
            --hidden-import serial.serialutil `
            --hidden-import serial.serialwin32 `
            --hidden-import matplotlib `
            --hidden-import matplotlib.backends.backend_tkagg `
            main.py
      - name: Windows artifact yukle
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: dist/STM32_Veri_Kaydedici.exe
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: macOS dosyasini indir
        uses: actions/download-artifact@v4
        with:
          name: macos-artifact
          path: release_assets/
      - name: Windows dosyasini indir
        uses: actions/download-artifact@v4
        with:
          name: windows-artifact
          path: release_assets/
      - name: Release Olustur
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.2.${{ github.run_number }}
          name: "STM32 Veri Kaydedici (Son Sürüm)"
          files: |
            release_assets/STM32_Veri_Kaydedici_macOS.dmg
            release_assets/STM32_Veri_Kaydedici.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
